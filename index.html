<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💋 mieux le viens on reste que le célibat</title>

<style>

/* ===== BACKGROUND ANIMÉ ===== */
body{
  margin:0;
  font-family:Poppins,sans-serif;
  color:#e0e6ff;
  background:#0a0f1a;
  overflow-x:hidden;
}

/* cœurs animés */
.heart{
  position:fixed;
  width:15px;
  height:15px;
  background:pink;
  transform:rotate(45deg);
  animation:float 8s linear infinite;
  opacity:0.6;
  z-index:0;
}

.heart:before,
.heart:after{
  content:"";
  position:absolute;
  width:15px;
  height:15px;
  background:pink;
  border-radius:50%;
}

.heart:before{top:-7px; left:0;}
.heart:after{left:-7px; top:0;}

@keyframes float{
  0%{transform:translateY(100vh) rotate(45deg); opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) rotate(45deg); opacity:0;}
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(20,20,40,0.95);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 15px;
  z-index:1000;
  backdrop-filter:blur(8px);
  border-bottom:1px solid #333;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  color:#ff4d6d;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* ===== BODY ===== */
.container{
  padding-top:90px;
  padding-bottom:90px;
}

/* ===== CARD MODERNE ===== */
.card{
  background:linear-gradient(135deg,#1a1f3a,#2a1440,#1b2b3a);
  border-radius:16px;
  padding:14px;
  margin:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
  z-index:2;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* TABLE */
table{
  width:100%;
  color:#fff;
  font-size:14px;
}

/* bouton */
button{
  background:linear-gradient(45deg,#ff4d6d,#ff7aa2);
  color:white;
  border:none;
  border-radius:10px;
  padding:9px 12px;
  cursor:pointer;
  margin-top:8px;
}

button:hover{
  filter:brightness(1.1);
}

.like-btn{
  cursor:pointer;
  color:#ffb3c6;
  font-weight:bold;
  display:inline-block;
  margin-top:8px;
}

/* ===== POPUP NUMERO ===== */
#popupNum{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.popup-content{
  background:#1a2438;
  border-radius:15px;
  padding:20px;
  max-width:340px;
  width:90%;
}

/* ===== PHOTO FIX MOBILE ===== */
#popupPhoto{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  align-items:center;
  justify-content:center;
  z-index:3000;
  padding:10px;
}

#photoView{
  max-width:95%;
  max-height:85vh;
  width:auto;
  height:auto;
  border-radius:12px;
  box-shadow:0 0 25px rgba(255,255,255,0.2);
  object-fit:contain;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(20,20,40,0.95);
  text-align:center;
  padding:10px;
  color:#aaa;
  font-size:13px;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<script>
for(let i=0;i<25;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(h);
}
</script>

<header>
  <div class="logo">
    <img src="https://raw.githubusercontent.com/Lfg237/image-lovestring/main/file_00000000aeac720aac7c9030f1dd48e6.png">
    💕 MIEUX LE VIENS ON RESTE QUE LE CELIBAT 💕
  </div>
</header>

<div class="container">
<h2 style="text-align:center;">💋 Liste des profils</h2>
<div id="postsContainer"></div>
</div>

<!-- NUMERO -->
<div id="popupNum">
  <div class="popup-content">
    <h3>📞 Numéro débloqué</h3>
    <p id="popupNumText"></p>
    <button onclick="fermerPopupNum()">Fermer</button>
  </div>
</div>

<!-- PHOTO -->
<div id="popupPhoto" onclick="fermerPhoto()">
  <img id="photoView">
</div>

<footer>
  © 2026 - Site de rencontre sérieux et sécurisé 💕
</footer>

<script>

const posts = [
{
  nom:"admin",
  ville:"Yaoundé",
  age:"44",
  profession:"admin",
  photo:"https://raw.githubusercontent.com/Lfg237/image-lovestring/main/file_00000000aeac720aac7c9030f1dd48e6.png",
  numero:"+237 6 59 83 82 17",
  code:"233"
},
{
  nom:"rodrigue tchameni",
  ville:"Douala bepanda",
  age:"43",
  profession:"ras",
  photo:"https://www.facebook.com/ashu.shanticlear.9",
  numero:"+237 6 82 21 04 68",
  code:"777"
},
{
  nom:"josé sop moté",
  ville:"Yaoundé",
  age:"40",
  profession:"medecin",
  photo:"https://via.placeholder.com/400",
  numero:"+237 6 99 78 60 67",
  code:"x7"
}
];

let currentIndex=null;

/* ===== RENDER ===== */
function renderPosts(){
  const c=document.getElementById("postsContainer");
  c.innerHTML="";

  posts.forEach((p,i)=>{
    c.innerHTML+=`
      <div class="card">
        <table>
          <tr><td><b>Nom</b></td><td>${p.nom}</td></tr>
          <tr><td><b>Ville</b></td><td>${p.ville}</td></tr>
          <tr><td><b>Âge</b></td><td>${p.age}</td></tr>
          <tr><td><b>Profession</b></td><td>${p.profession||""}</td></tr>
        </table>

        <button onclick="ouvrirPhoto('${p.photo}')">📷 Voir photo</button>

        <br>

        <span class="like-btn" onclick="demanderCode(${i})">
          📞 Voir numéro
        </span>

        <br>

        <button onclick="ouvrirLien('${p.photo}')">🌐 Ouvrir lien externe</button>
      </div>
    `;
  });
}
renderPosts();

/* ===== CODE ===== */
function demanderCode(i){
  const code=prompt("Entrez le code secret :");

  if(code===posts[i].code){
    currentIndex=i;
    afficherNumero();
  }else{
    alert("Code incorrect");
  }
}

/* ===== NUMERO ===== */
function afficherNumero(){
  document.getElementById("popupNumText").innerText=posts[currentIndex].numero;
  document.getElementById("popupNum").style.display="flex";
}

function fermerPopupNum(){
  document.getElementById("popupNum").style.display="none";
}

/* ===== PHOTO ===== */
function ouvrirPhoto(src){
  if(src.startsWith("http")){
    document.getElementById("photoView").src=src;
    document.getElementById("popupPhoto").style.display="flex";
  }
}

/* ===== LIENS EXTERNES FIX ===== */
function ouvrirLien(url){
  if(url && url.startsWith("http")){
    window.open(url, "_blank", "noopener,noreferrer");
  } else {
    alert("Lien invalide");
  }
}

function fermerPhoto(){
  document.getElementById("popupPhoto").style.display="none";
}
</script>

</body>
</html>
